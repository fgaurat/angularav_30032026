
<table class="table">
  <thead>
    <tr>
      <th></th>
      <th></th>
      <th></th>
      <th></th>
      <th></th>
    </tr>
  </thead>
  <tbody>
@for(todo of todos$|async;track todo.id) {
<tr>
  <td>{{ todo.id }}</td>
  <td>{{ todo.userId }}</td>
  <td>{{ todo.title }}</td>
  <td>{{ todo.completed }}</td>
  <td><input type="checkbox" [(ngModel)]="todo.completed"></td>
  <td>
    <button class="btn btn-danger" (click)="delete(todo)">Delete</button>
  </td>

</tr>

}
</tbody>
</table>
