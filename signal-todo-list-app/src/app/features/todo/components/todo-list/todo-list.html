<p>todo-list works!</p>
<h2>completed todos: {{completedTodos().length}}</h2>
<h2>pending todos: {{pendingTodos().length}}</h2>

<table class="table">
  <thead>
    <tr>
      <th></th>
      <th></th>
      <th></th>
      <th></th>
      <th></th>
    </tr>
  </thead>
  <tbody>
@for(todo of todos();track todo.id) {
<tr>
  <td>{{ todo.id }}</td>
  <td>{{ todo.userId }}</td>
  <td>{{ todo.title }}</td>
  <td>{{ todo.completed }}</td>
  <td><input type="checkbox" [(ngModel)]="todo.completed"></td>
  <td>
    <button class="btn btn-danger" (click)="delete(todo)">Delete</button>
  </td>

</tr>

}
</tbody>
</table>
