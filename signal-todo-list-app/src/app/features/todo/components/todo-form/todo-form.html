<h2>todo-form</h2>

<div class="card" style="width: 18rem;">
    <div class="card-body">

        <form class="row g-3"  #todoForm="ngForm" (ngSubmit)="submitTodo()">
            <div class="col-12">
                <label for="todoTitle" class="form-label">Titre</label>
                <input
                    type="text"
                    required
                    [(ngModel)]="todoFormModel.title"
                    #todoTitle="ngModel"
                    name="todoTitle" class="form-control" placeholder="Todo title...">
                  @if(todoTitle.invalid && todoTitle.touched){
                    <div class="alert alert-danger">
                        Ce champ est requis !!!
                    </div>
                  }
            </div>
            <pre>
              valid:{{todoTitle.valid}}
              invalid:{{todoTitle.invalid}}
            </pre>
            <div class="col-12">
                <div class="form-check">
                    <input [(ngModel)]="todoFormModel.completed" name="todoCompleted" class="form-check-input" type="checkbox">
                    <label class="form-check-label" for="todoCompleted">
                        Completed
                    </label>
                </div>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary" [disabled]="todoForm.invalid" >Ajouter</button>
            </div>
        </form>
    </div>
</div>

<pre>
{{todoFormModel|json}}
</pre>
